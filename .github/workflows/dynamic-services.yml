name: Dynamic Services

on:
  workflow_dispatch:
  push:

jobs:
  config:
    runs-on: ubuntu-latest
    outputs:
      port: ${{ steps.port-nginx.outputs.port }}
    steps:
      - name: port-nginx
        id: port-nginx
        run: echo "port=$(shuf -i 2000-65000 -n 1)" >> $GITHUB_OUTPUT
  runner-job:
    runs-on: ubuntu-latest
    needs: config
    services:
      redis:
        image: nginx:latest
        ports:
          - ${{ needs.config.outputs.port }}:80
    steps:
      - name: Test
        run: curl http://localhost:${{ needs.config.outputs.port }}
